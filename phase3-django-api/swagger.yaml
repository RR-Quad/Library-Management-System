components:
  schemas:
    Author:
      type: object
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when the record was created.
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when the record was last updated.
        first_name:
          type: string
          description: Author's first name.
          maxLength: 20
        last_name:
          type: string
          description: Author's last name.
          maxLength: 20
        birth_date:
          type: string
          format: date
          nullable: true
          description: Author's date of birth.
        nationality:
          type: string
          nullable: true
          description: Author's nationality.
          maxLength: 20
        biography:
          type: string
          nullable: true
          description: Short biography of the author.
      required:
      - created_at
      - first_name
      - last_name
      - updated_at
      - url
    Book:
      type: object
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        library:
          allOf:
          - $ref: '#/components/schemas/NestedLibrary'
          readOnly: true
        authors:
          type: array
          items:
            $ref: '#/components/schemas/NestedAuthor'
          readOnly: true
        categories:
          type: array
          items:
            $ref: '#/components/schemas/NestedCategory'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when the record was created.
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when the record was last updated.
        title:
          type: string
          description: Title of the book.
          maxLength: 50
        isbn:
          type: string
          description: International Standard Book Number.
          maxLength: 15
        publication_date:
          type: string
          format: date
          description: Date the book was originally published.
        total_copies:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Total number of copies owned by the library.
        available_copies:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Number of copies currently available for borrowing.
        library_id:
          type: string
          format: uri
          description: Library where this book is located.
      required:
      - authors
      - available_copies
      - categories
      - created_at
      - isbn
      - library
      - library_id
      - publication_date
      - title
      - total_copies
      - updated_at
      - url
    BookSearch:
      type: object
      properties:
        library_id:
          type: integer
          nullable: true
          description: Filter books by library ID.
        category_id:
          type: integer
          nullable: true
          description: Filter books by category ID.
        author_name:
          type: string
          description: Full author name (first and last).
    BorrowBook:
      type: object
      properties:
        book_id:
          type: integer
          description: ID of the book to be borrowed.
        member_id:
          type: integer
          description: ID of the member borrowing the book.
      required:
      - book_id
      - member_id
    Borrowing:
      type: object
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        book:
          allOf:
          - $ref: '#/components/schemas/Book'
          readOnly: true
        member:
          allOf:
          - $ref: '#/components/schemas/NestedMember'
          readOnly: true
        member_name:
          type: string
          readOnly: true
          description: Full name of the member who borrowed the book.
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when the record was created.
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when the record was last updated.
        borrow_date:
          type: string
          format: date
          description: Date when the book was borrowed.
        due_date:
          type: string
          format: date
          description: Date by which the book must be returned.
        return_date:
          type: string
          format: date
          nullable: true
          description: Actual return date of the book.
        late_fee:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
          description: Late fee charged if returned after due date.
        member_id:
          type: string
          format: uri
          description: Member who borrowed the book.
        book_id:
          type: string
          format: uri
          description: Book that was borrowed.
      required:
      - book
      - book_id
      - created_at
      - due_date
      - member
      - member_id
      - member_name
      - updated_at
      - url
    Category:
      type: object
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when the record was created.
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when the record was last updated.
        name:
          type: string
          description: Category or genre name.
          maxLength: 30
        description:
          type: string
          nullable: true
          description: Optional description of the category.
      required:
      - created_at
      - name
      - updated_at
      - url
    Library:
      type: object
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when the record was created.
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when the record was last updated.
        name:
          type: string
          description: Name of the library.
          maxLength: 30
        campus_location:
          type: string
          description: Campus location where the library is situated.
          maxLength: 30
        contact_email:
          type: string
          format: email
          description: Official contact email for the library.
          maxLength: 254
        phone_number:
          type: string
          description: Contact phone number for the library.
          maxLength: 15
      required:
      - campus_location
      - contact_email
      - created_at
      - name
      - phone_number
      - updated_at
      - url
    Member:
      type: object
      properties:
