components:
  schemas:
    Author:
      type: object
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        first_name:
          type: string
          description: Author's first name.
          maxLength: 20
        last_name:
          type: string
          description: Author's last name.
          maxLength: 20
        birth_date:
          type: string
          format: date
          nullable: true
          description: Author's date of birth.
        nationality:
          type: string
          nullable: true
          description: Country of origin or nationality.
          maxLength: 20
        biography:
          type: string
          nullable: true
          description: Short biography describing the author.
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - first_name
      - last_name
      - updated_at
      - url
    Book:
      type: object
      properties:
        book_id:
          type: integer
          readOnly: true
        title:
          type: string
          description: Title of the book.
          maxLength: 50
        isbn:
          type: string
          description: International Standard Book Number.
          maxLength: 15
        publication_date:
          type: string
          format: date
          description: Date the book was originally published.
        total_copies:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Total number of copies owned by the library.
        available_copies:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Number of copies currently available for borrowing.
        library:
          allOf:
          - $ref: '#/components/schemas/NestedLibrary'
          readOnly: true
          description: Library where this book is stored.
        authors:
          type: array
          items:
            $ref: '#/components/schemas/NestedAuthor'
          readOnly: true
          description: Authors who wrote the book.
        categories:
          type: array
          items:
            $ref: '#/components/schemas/NestedCategory'
          readOnly: true
          description: Categories associated with this book.
      required:
      - authors
      - available_copies
      - book_id
      - categories
      - isbn
      - library
      - publication_date
      - title
      - total_copies
    BookSearch:
      type: object
      properties:
        library_id:
          type: integer
          nullable: true
          description: Filter books by library ID.
        category_id:
          type: integer
          nullable: true
          description: Filter books by category ID.
        author_name:
          type: string
          description: Filter books by full author name.
    BorrowBook:
      type: object
      properties:
        book_id:
          type: integer
          description: ID of the book to be borrowed.
        member_id:
          type: integer
          description: ID of the member borrowing the book.
      required:
      - book_id
      - member_id
    Borrowing:
      type: object
      properties:
        url:
