name: Django CI (uv + pytest)

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: phase3-django-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install uv
        run: pip install uv

      - name: Create virtual environment
        run: uv venv

      - name: Sync dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest -v
