            * `student` - Student
            * `faculty` - Faculty
        registration_date:
          type: string
          format: date
          description: Date the member registered with the library.
      required:
      - contact_email
      - created_at
      - first_name
      - last_name
      - member_type
      - phone_number
      - updated_at
      - url
    MemberTypeEnum:
      enum:
      - student
      - faculty
      type: string
      description: |-
        * `student` - Student
        * `faculty` - Faculty
