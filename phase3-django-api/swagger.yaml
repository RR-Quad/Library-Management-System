openapi: 3.0.3
info:
  title: Library Management System API
  version: 1.0.0
  description: "\nA RESTful API for managing library operations including:\n\n• Library
    branches  \n• Books, authors, and categories  \n• Member registration and management
    \ \n• Borrowing and returning books  \n• Book reviews and ratings  \n• Library
    analytics and statistics  \n\nThis API supports advanced features such as:\n\n•
    Book search by author, category, and library  \n• Book availability checks  \n•
    Borrowing history tracking  \n• Recommendation engine for popular and highly rated
    books  \n• Aggregated statistics for library usage  \n\nAll endpoints return JSON
    responses and follow RESTful conventions.\n"
paths:
  /api/authors/:
    get:
      operationId: authors_list
      description: Retrieve a paginated list of all authors. Supports search and ordering.
      summary: List Authors
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - authors
      security:
      - cookieAuth: []
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAuthorList'
              examples:
                AuthorExample:
                  value:
                    count: 123
                    next: http://api.example.org/accounts/?page=4
                    previous: http://api.example.org/accounts/?page=2
                    results:
                    - author_id: 1
                      first_name: J.K.
                      last_name: Rowling
                      birth_date: '1965-07-31'
                      nationality: British
                      biography: Author of the Harry Potter series.
                  summary: Example of an author record
                  description: Represents a book author.
          description: ''
    post:
      operationId: authors_create
      description: Create a new author record.
      summary: Create Author
      tags:
      - authors
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Author'
            examples:
              AuthorExample:
                value:
                  author_id: 1
                  first_name: J.K.
                  last_name: Rowling
                  birth_date: '1965-07-31'
                  nationality: British
                  biography: Author of the Harry Potter series.
                summary: Example of an author record
                description: Represents a book author.
        required: true
      security:
      - cookieAuth: []
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
              examples:
                AuthorExample:
                  value:
                    author_id: 1
                    first_name: J.K.
